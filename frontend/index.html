<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/guardai-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuardAI - Agentic AI Fraud & Threat Detection Platform</title>
    <meta name="description" content="Complete fraud detection platform powered by autonomous AI agents. Real-time transaction analysis and phishing email detection." />
    <meta name="keywords" content="fraud detection, AI, machine learning, cybersecurity, phishing detection, LangGraph" />
    <meta name="author" content="GuardAI Team" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="GuardAI - Agentic AI Fraud Detection Platform" />
    <meta property="og:description" content="Real-time fraud detection powered by autonomous AI agents" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GuardAI - AI Fraud Detection" />
    <meta name="twitter:description" content="Real-time fraud detection with LangGraph agents" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <style>
      /* Prevent flash of unstyled content */
      body {
        background-color: #0A0F1E;
        color: #E4E4E7;
        font-family: 'Inter', system-ui, sans-serif;
        margin: 0;
        padding: 0;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading animation */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0A0F1E;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #2A2F3E;
        border-top: 3px solid #00D4FF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
